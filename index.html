<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0c2340">
<title>Kule Ofis — Çizim Stüdyosu Tycoon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stars" id="starsField"></div>

<!-- DİL SEÇİM EKRANI -->
<div id="languageScreen" style="display:none;">
  <div class="lang-card">
    <div class="lang-title" id="langSelectLabel">Select Your Language:</div>
    <div class="lang-flags">
      <button class="lang-flag-btn" id="langTrBtn">
        <span class="flag-circle">🇹🇷</span>
        <span class="flag-label">Türkçe</span>
      </button>
      <button class="lang-flag-btn" id="langEnBtn">
        <span class="flag-circle">🇺🇸</span>
        <span class="flag-label">English</span>
      </button>
    </div>
  </div>
</div>

<!-- START SCREEN: burası artık dinamik — önce e-posta/kod ekranı,
     sonra (yeni kullanıcıysa) şirket kurma ekranı buraya yazılıyor -->
<div id="startScreen"></div>

<!-- TOP BAR -->
<div id="topbar" style="display:none;">
  <div id="companyName">—<span>Çizim Stüdyosu</span></div>
  <div class="topbar-right">
    <button id="wheelBtn" class="icon-btn" title="Günlük Çark">🎡</button>
    <button id="marketBtn" class="icon-btn" title="Market">🛒</button>
    <div id="moneyBox" title="Market'i aç">💰 <span id="moneyVal">0</span> ₺</div>
    <button id="rebirthBtn" class="icon-btn" title="Rebirth">👑</button>
  </div>
</div>

<!-- BUILDING -->
<div id="building"></div>

<!-- REKLAM BONUSU: dairesel geri sayım rozeti -->
<div id="adBuffWidget" class="ad-buff-widget" style="display:none;">
  <svg viewBox="0 0 100 100" class="ring-svg">
    <circle class="ring-bg" cx="50" cy="50" r="42"></circle>
    <circle class="ring-fg" id="ringFg" cx="50" cy="50" r="42"></circle>
  </svg>
  <div class="ring-center">
    <div class="ring-label">x2 <span class="arrow">›</span></div>
    <div class="ring-timer" id="ringTimer">15:00</div>
  </div>
</div>

<!-- GENEL POPUP -->
<div id="popupOverlay">
  <div class="popup-card" id="popupCard"></div>
</div>

<!-- SEKRETER -->
<div id="secretaryWrap">
  <img id="secretaryImg" src="sekreter.png" alt="Sekreter">
  <div id="bubble">
    <div class="txt" id="bubbleText"></div>
    <div class="skip" id="bubbleSkip">Atla ▶</div>
  </div>
</div>

<!-- SUPABASE: sıra kritik — client ÖNCE hazır olmalı -->
<script src="config.js"></script>
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  window.supabaseClient = createClient(window.SUPABASE_URL || SUPABASE_URL, window.SUPABASE_ANON_KEY || SUPABASE_ANON_KEY);
  window.dispatchEvent(new Event('supabase-ready'));
</script>
<script src="language.js"></script>
<script src="auth.js"></script>
<script src="cloud-sync.js"></script>
<script src="app.js"></script>
</body>
</html>
